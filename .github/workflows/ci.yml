# Generated by flext_infra.github.workflows - DO NOT EDIT
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Setup (advisory)
        continue-on-error: true
        run: make setup

      - name: Check changed files (blocking)
        env:
          DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -f .gitmodules ]; then
            echo "workspace root: changed-file gate runs in each project's CI"
            exit 0
          fi
          if [ -z "$DIFF_BASE" ] || ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
            echo "no usable diff base; skipping changed-files gate"
            exit 0
          fi
          files=$(git diff --name-only --diff-filter=ACMRTUXB "$DIFF_BASE...HEAD" -- '*.py' | tr '\n' ' ')
          if [ -n "$(echo "$files" | tr -d ' ')" ]; then
            make check FILES="$files"
          else
            echo "no python changes"
          fi

      - name: Check (advisory)
        continue-on-error: true
        run: make check

      - name: Test (advisory)
        continue-on-error: true
        run: make test

      - name: Val (advisory)
        continue-on-error: true
        run: make val
