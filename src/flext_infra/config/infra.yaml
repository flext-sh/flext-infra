Infra:
  name: flext-infra
  version: "0.12.0-dev"
  source_scan:
    roots:
      - src
      - scripts
    # NOTE (multi-agent, mro-wkii.17.24): resource names are rejected before indexing.
    ignored_resources:
      - .cache
      # mro-j47u: agent worktrees are duplicate repositories, never production input.
      - .claude
      - .git
      - .mypy_cache
      - .pyrefly_cache
      - .pytest_cache
      - .reports
      - .ruff_cache
      - .tox
      - .venv
      - __pycache__
      - build
      - conftest.py
      - dist
      - dist-packages
      - examples
      - legado
      - node_modules
      - site-packages
      - tests
      - vendor
      - venv
