Infra:
  name: flext-infra
  version: "0.12.0-dev"
  source_scan:
    roots:
      - src
      - scripts
    ignored_directories:
      - .cache
      - .git
      - .mypy_cache
      - .pyrefly_cache
      - .pytest_cache
      - .reports
      - .ruff_cache
      - .tox
      - .venv
      - __pycache__
      - build
      - dist
      - dist-packages
      - examples
      - legado
      - node_modules
      - site-packages
      - tests
      - vendor
      - venv
