Infra:
  name: flext-infra
  # NOTE(mro-wkii.17.26, agent codex): canonical package version for the 0.20 test release.
  version: "0.20.0-dev0"
  source_scan:
    roots:
      - src
      - scripts
    # NOTE (multi-agent, mro-wkii.17.24): resource names are rejected before indexing.
    ignored_resources:
      - .cache
      # mro-j47u: agent worktrees are duplicate repositories, never production input.
      - .claude
      - .git
      - .mypy_cache
      - .pyrefly_cache
      - .pytest_cache
      - .reports
      - .ruff_cache
      - .tox
      - .venv
      - __pycache__
      - build
      - conftest.py
      - dist
      - dist-packages
      - examples
      - legado
      - node_modules
      - site-packages
      - tests
      - vendor
      - venv
  # mro-wkii.17.26 (codex): Rope owns one semantic universe for every FLEXT
  # project and consumer surface in the enclosing workspace.
  rope_index:
    roots: [src, tests, examples, scripts]
    ignored_resources:
      - .cache
      - .claude
      - .git
      - .mypy_cache
      - .pyrefly_cache
      - .pytest_cache
      - .reports
      - .ruff_cache
      - .tox
      - .venv
      - __pycache__
      - build
      - dist
      - dist-packages
      - legado
      - node_modules
      - site-packages
      - vendor
      - venv
  # mro-j47u (codex): every static rule is validated data; the detector owns no policy.
  enforcement:
    rules:
      - {operator: import_module, module: pydantic, owner_project: flext-core, kind: direct_pydantic_import,
        detail: "Use the canonical m/u facades outside flext-core."}
      - {operator: import_module, module: structlog, owner_project: flext-core, kind: direct_structlog_import,
        detail: "Use u.fetch_logger outside flext-core."}
      - {operator: import_module, module: oracledb, owner_project: flext-db-oracle, kind: direct_oracledb_import,
        detail: "Use the canonical database facade."}
      - {operator: import_module, module: ldap3, owner_project: flext-ldap, kind: direct_ldap3_import,
        detail: "Use the canonical LDAP facade."}
      - {operator: import_module, module: pdb, kind: breakpoint, detail: "Debugger imports\
          \ are forbidden in production source."}
      - {operator: import_member, module: typing, member: Dict, kind: typing_dict_import,
        detail: "Use the canonical t mapping alias or an m/p contract."}
      - {operator: import_member, module: typing, member: List, kind: typing_list_import,
        detail: "Use the canonical t sequence alias."}
      - {operator: attribute, module: typing, member: Dict, kind: typing_dict_attr, detail: "Use\
          \ the canonical t mapping alias or an m/p contract."}
      - {operator: attribute, module: typing, member: List, kind: typing_list_attr, detail: "Use\
          \ the canonical t sequence alias."}
      - {operator: call, name: print, kind: print, detail: "Use structured logging in production\
          \ source."}
      - {operator: call, name: breakpoint, kind: breakpoint, detail: "Remove breakpoint calls\
          \ from production source."}
      - {operator: call_keyword, name: open, keyword: encoding, kind: open_encoding, detail: "Pass\
          \ an explicit encoding keyword to open."}
      - {operator: annotation, name: dict, kind: dict_annotation, detail: "Use the owning\
          \ m model through its p protocol."}
      - {operator: bare_except, kind: bare_except, detail: "Declare the exact exception contract\
          \ instead of bare except."}
      - {operator: annotated_string, name: __version__, kind: hardcoded_version, detail: "Resolve\
          \ package versions through importlib.metadata."}
      - {operator: comment, marker: "# type: ignore", kind: type_ignore, detail: "Fix the\
          \ underlying typing contract instead of suppressing it."}
      - {operator: comment, marker: "# noqa", kind: noqa, detail: "Fix the underlying lint\
          \ defect instead of suppressing it."}
      # mro-wkii.17.26 (codex): Ruff supplies the diagnostic; Rope must prove
      # the configured test scope before the closed operator inserts content.
      - operator: ruff_issue
        code: D102
        kind: missing_test_method_docstring
        detail: "Every public test method states the behavior it proves."
        fix-operator: insert_test_docstring
        roots: [tests]
        scope-kinds: [function, method]
        name-prefix: test_
        docstring-template: "Test {summary}."
