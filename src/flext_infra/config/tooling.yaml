Infra:
  tooling:
    # mro-j47u (codex): canonical validated tooling and suppression-policy SSOT.
    tools:
      codespell:
        check-filenames: true
        ignore-words-list: crate,nd
      # mro-j47u (codex): non-linter tool sections are config-owned as well.
      deptry:
        known-first-party: [flext_core]
        pep621-dev-dependency-groups: [dev]
      hatch:
        allow-direct-references: true
      ruff:
        # NOTE (multi-agent, mro-wkii.17.25): legacy trees are not production roots.
        exclude:
          - .git
          - .mypy_cache
          - .pytest_cache
          - .ruff_cache
          - .venv
          - __pycache__
          - "**/__pyrefly_virtual__/**"
          - archive
          - backup
          - build
          - dist
          - htmlcov
          - temp-backup
          - examples
          - legado
          - tests
          - typings
          - vendor
          - venv
        fix: false
        line-length: 88
        preview: true
        respect-gitignore: true
        show-fixes: true
        src: [src]
        target-version: py313
        format:
          docstring-code-format: true
          indent-style: space
          line-ending: lf
          quote-style: double
          skip-magic-trailing-comma: true
        lint:
          select:
            - ALL
          # mro-j47u (codex): banned API messages are policy data, never template literals.
          banned-api:
            argparse: "Use cli.register_result_command + Pydantic model from flext_cli."
            click: "Use flext_cli.cli application, registration, execution, and invocation\
              \ methods."
            rich: "Use cli.print / cli.display_message / cli.render_panel / cli.render_table."
            typer: "Use cli.create_app_with_common_params / cli.register_command from flext_cli."
          ignore:
            - B009
            - B010
            - B017
            - BLE001
            - C901
            - COM812
            - CPY001
            - D203
            - D213
            - D401
            - D417
            - ANN202
            - DOC201
            - DOC202
            - DOC402
            - DOC501
            - DOC502
            - E501
            - ERA001
            - FBT003
            - G004
            - N805
            - N813
            - N816
            - PIE790
            - PLR0904
            - PLR0911
            - PLR0912
            - PLR0913
            - PLR0914
            - PLR0915
            - PLR0917
            - PLR1702
            - PLR6301
            - PLW2901
            - PLW0108
            - PLW3201
            - PYI042
            - Q000
            - S608
            - RUF001
            - RUF002
            - RUF003
            - RUF005
            - TC001
            - TC002
            - TC003
            - TRY003
            - TRY300
            - TRY301
            - UP040
            - W293
          isort:
            combine-as-imports: true
            force-single-line: false
            split-on-trailing-comma: false
          per-file-ignores:
            "**/.vulture_whitelist.py": [ALL]
            "**/*_pb2*.py": [ALL]
            "**/*dispatcher*": []
            "**/*docs*": [INP001, S404, S603, T201]
            "**/*exceptions*": [A001, S105, SLF001]
            "**/*handlers*": []
            "**/*instrumentation*": [C901, FBT001, SLF001]
            "**/*loggings*": [PLW0603, PLR0904]
            "**/*middleware*": [ANN401, FBT001, FBT002, PLC2801, S107]
            "**/*models*": [ANN401, FBT001, PLC2701, PLR0206, PLW0603]
            "**/*oracle*": [DTZ007]
            "**/*result*": [PLC2701, SLF001]
            "**/*runtime*": []
            "**/*scripts*":
              - EXE001
              - FIX002
              - INP001
              - PLR0911
              - PLR0912
              - PLR0915
              - PLR2004
              - PLW2901
              - S105
              - S107
              - S404
              - S603
              - T201
              - TID252
            "**/*service*": [N815, S404, S603, SLF001, PLC2801]
            "**/*subprocess_utils*": [S404, S603]
            "**/*typings*": [ANN401]
            "**/*utilities*": [C901, E402, PLC2801, PLW1510, S404, S603]
            "**/__init__.py":
              - A004
              - ANN401
              - D107
              - F401
              - F403
              - F405
              - F822
              - INP001
              - N999
              - PLC2701
              - RUF067
              - TC004
            "**/_utilities/parser.py": [ARG004, FBT001]
            "**/settings.py": [ANN401, FBT001, SLF001]
            "**/_constants/*.py": [S105]
            "**/constants.py": [S105]
            "**/container.py": [ANN401, SLF001]
            "**/context.py": []
            "**/file_tools.py": [D102]
            "**/managers.py": [S105]
            "**/models.py": [PLC0415, PLC2801, S102, S105]
            "**/output.py":
              - FBT001
            # FLEXT config/settings namespaces are deliberately PascalCase
            # (config.<Namespace> / settings.<Namespace>). Protocol properties
            # must preserve that exact public member name; N802 models functions,
            # not namespace-shaped protocol attributes.
            "**/_config.py": [N802]
            "**/_protocols/*.py": [N802]
            "**/flext_cli/_protocols/framework.py": [A002]
            "**/_settings.py":
              - N802
            # flext-cli is the single framework-adapter owner. Direct Click,
            # Typer, and Rich imports stay banned in every consumer while the
            # owning boundary must import those libraries to expose the facade.
            "**/flext_cli/_utilities/formatters.py": [TID251]
            "**/flext_cli/_utilities/framework.py": [A002, TID251]
            "**/plugins/*.py": [FBT001, FBT002, S404, S603, S607, TID252]
            "**/providers/*.py": [S106, S107]
            "**/services/prompts.py": [D102, D107]
            "**/singer/*.py": [S404, S603]
            "**/tools/*.py": [FBT001, FBT002, N802, S404, S603, S607, T201]
            "**/tools/**/*.py": [FBT001, FBT002, N802, S404, S603, S607, T201]
            "**/alert_manager*.py": [S310]
            "**/external_command*.py": [S404, S603]
            "**/orchestrator*.py": [S404, S603]
            "**/protocol_impls/*.py": [SLF001]
            "**/typings.py": [RUF036]
            "**/workspace/*.py": [PLC0415, S404, S603, S607]
      mypy:
        plugins: [pydantic.mypy, returns.contrib.mypy.returns_plugin]
        exclude: ^(?:tests|examples|legado)(?:/|$)
        # mro-j47u: every retained global exclusion carries its tested rationale;
        # generated pyprojects receive this evidence as managed comments.
        disabled-error-codes:
          arg-type: Public p.Result values widen only in Mypy; Pyright and Pyrefly retain
            T.
          assignment: Dependency-injector descriptors lose their MRO-bound type only in Mypy.
          attr-defined: PEP 562 facade members inherited through MRO are invisible to Mypy.
          call-arg: Pydantic v2 init signatures behind facade MRO are incomplete in Mypy.
          misc: Valid PEP 695 nested facade aliases are rejected under Mypy's misc bucket.
          name-defined: Generated PEP 562 exports are installed at runtime but absent to Mypy.
          no-any-return: Facade returns widen to Any only in Mypy; Pyright and Pyrefly resolve
            them.
          no-redef: Canonical c-t-p-m-u facades intentionally rebind their inherited short
            alias.
          prop-decorator: Mypy loses Pydantic computed-field descriptors across composed MRO.
          type-var: Mypy 1.20 drops T from inherited p.ResultLike; the direct owner passes.
          unreachable: Mypy over-narrows facade values and rejects live defensive guards.
          valid-type: Mypy rejects facade namespaces used as owners in valid PEP 695 aliases.
        boolean-settings:
          # Discovery + namespace (retained)
          ignore_missing_imports: true
          namespace_packages: true
          explicit_package_bases: true
          # Safe strict flags aligned with pyrefly (already 0/31 workspace-wide).
          # Noisier flags (disallow_untyped_defs, disallow_any_unimported,
          # ignore_missing_imports=false) are deferred to a follow-up cycle to
          # avoid surfacing ~20 unrelated stub issues in the same PR.
          check_untyped_defs: true
          extra_checks: true
          local_partial_types: true
          no_implicit_reexport: true
          # strict_concatenate is deprecated in mypy 1.20+; extra_checks covers it
          strict_equality: true
          warn_redundant_casts: true
          warn_return_any: true
          warn_unreachable: true
          warn_unused_ignores: true
        string-settings:
          follow_imports: normal
        overrides: []
      pydantic-mypy:
        init_forbid_extra: true
        init_typed: true
        warn_required_dynamic_aliases: true
        warn-untyped-fields: true
      pyright:
        strict-settings:
          pythonVersion: "3.13"
          pythonPlatform: Linux
          typeCheckingMode: strict
        extended-settings:
          reportArgumentType: none
          reportAttributeAccessIssue: none
          reportCallIssue: none
          reportConstantRedefinition: error
          reportIncompatibleMethodOverride: error
          reportIncompatibleVariableOverride: none
          reportInconsistentConstructor: error
          reportInvalidTypeForm: none
          reportMissingImports: error
          reportMissingModuleSource: error
          reportMissingTypeStubs: none
          reportPrivateUsage: warning
          reportUnknownArgumentType: none
          reportUnknownLambdaType: none
          reportUnknownMemberType: none
          reportUnknownParameterType: none
          reportUnknownVariableType: none
          reportUnnecessaryCast: error
          reportUnnecessaryComparison: warning
          reportUnnecessaryIsInstance: warning
          reportUnreachable: none
          reportUnsupportedDunderAll: none
          reportUntypedBaseClass: none
          reportUntypedFunctionDecorator: none
          reportUnusedClass: error
          reportUnusedFunction: error
          reportUnusedImport: error
          reportUnusedVariable: error
        lazy-import-suppressions:
          reportAttributeAccessIssue: "none"
          reportInvalidTypeForm: none
          reportPrivateImportUsage: "none"
          reportUnknownArgumentType: "none"
          reportUnknownLambdaType: "none"
          reportUnknownMemberType: none
          reportUnknownParameterType: "none"
          reportUnknownVariableType: "none"
          reportUnusedImport: "none"
        source-env-suppressions:
          reportGeneralTypeIssues: "none"
          reportReturnType: "none"
        test-like-env-suppressions:
          reportArgumentType: "none"
          reportReturnType: "none"
        path-rules:
          # NOTE (multi-agent, mro-wkii.17.25): only productive Python roots become environments.
          source-dir: src
          project-root: .
          env-dirs: [src, scripts]
          test-like-dirs: [scripts]
          default-excludes:
            - "**/node_modules"
            - "**/__pycache__"
            - "**/__pyrefly_virtual__/**"
            - "**/.mypy_cache"
            - "**/.ruff_cache"
            - "**/.pytest_cache"
            - "**/.*"
            - "**/examples"
            - "**/examples/**"
            - "**/legado"
            - "**/legado/**"
            - "**/tests"
            - "**/tests/**"
            - .venv
            - "**/.venv"
            - "**/.venv/**"
            - "**/venv"
            - "**/venv/**"
            - "**/site-packages"
            - "**/site-packages/**"
            - "**/dist-packages"
            - "**/dist-packages/**"
          dynamic-exclude-dirs: [.git, .reports, vendor]
          root-typings-paths: []
          project-typings-paths: []
          ignored-diagnostic-globs: []
          # mro-j47u (codex): Rope 1.14/latest has no public PEP 695 walker
          # registration API. This existing-path-only environment is the tested
          # vendor boundary; broad src code keeps reportPrivateUsage=error.
          diagnostic-path-overrides:
            - root: src/flext_infra/_utilities/rope_patch
              reportPrivateUsage: none
              rationale: >-
                Rope 1.14 and upstream master require private walker handler
                registration for Python 3.13 PEP 695 source regions.
          source-report-private-usage: error
          test-like-report-private-usage: none
          other-report-private-usage: none
          root-venv-path: .
          project-venv-path: ..
          venv-name: .venv
      coverage:
        fail-under:
          core: 45
          domain: 30
          platform: 25
          integration: 20
          app: 15
        show-missing: true
        skip-covered: false
        precision: 2
        exclude-also:
          - "if _t.TYPE_CHECKING:"
          - "if TYPE_CHECKING:"
          - "if typing.TYPE_CHECKING:"
        omit: ["*/dependency_injector/providers.pyx"]
      pyrefly:
        disable-project-excludes-heuristics: true
        ignore-errors-in-generated-code: true
        python-version: "3.13"
        use-ignore-files: false
        strict-errors:
          # --- type safety ---
          - bad-argument-count
          - bad-argument-type
          - bad-assignment
          - bad-class-definition
          - bad-context-manager
          - bad-dunder-all
          - bad-function-definition
          - bad-index
          - bad-instantiation
          - bad-keyword-argument
          - bad-match
          - bad-param-name-override
          - bad-raise
          - bad-return
          - bad-specialization
          - bad-typed-dict
          - bad-typed-dict-key
          - bad-unpacking
          - deprecated
          - implicit-abstract-class
          - implicit-any
          - implicit-import
          - implicitly-defined-attribute
          - inconsistent-inheritance
          - inconsistent-overload
          - invalid-annotation
          - invalid-argument
          - invalid-decorator
          - invalid-inheritance
          - invalid-literal
          - invalid-overload
          - invalid-param-spec
          - invalid-pattern
          - invalid-self-type
          - invalid-super-call
          - invalid-type-alias
          - invalid-type-var
          - invalid-type-var-tuple
          - invalid-variance
          - invalid-yield
          - missing-argument
          - missing-attribute
          - missing-import
          - missing-module-attribute
          - missing-override-decorator
          - missing-source
          - missing-source-for-stubs
          - no-access
          - no-matching-overload
          - not-a-type
          - not-async
          - not-callable
          - not-iterable
          - not-required-key-access
          - open-unpacking
          - protocol-implicitly-defined-attribute
          - read-only
          - redefinition
          - redundant-cast
          - redundant-condition
          - unannotated-attribute
          - unannotated-parameter
          - unannotated-return
          - unbound-name
          - unexpected-keyword
          - unexpected-positional-argument
          - unknown-name
          - unnecessary-comparison
          - unnecessary-type-conversion
          - unreachable
          - unresolvable-dunder-all
          - unsafe-overlap
          - unsupported
          - unsupported-delete
          - unsupported-operation
          - untyped-import
          - unused-coroutine
          - unused-ignore
          - variance-mismatch
          - inconsistent-overload-default
        disabled-errors:
          - abstract-method-call
          - bad-override
          - non-convergent-recursion
          - non-exhaustive-match
        project-exclude-globs:
          - "**/__pycache__"
          - "**/__pyrefly_virtual__/**"
          - "**/node_modules"
          - "**/.venv/**"
          - "**/*_pb2*.py"
          - "**/*_pb2_grpc*.py"
          - "**/site-packages/**"
          - "**/typings/**"
          - "**/venv/**"
          - "**/vendor/**"
          - "**/examples/**"
          - "**/legado/**"
          - "**/tests/**"
          - ".flext-deps/**"
          - ".venv/**"
          - "typings/**"
          - "vendor/**"
        path-rules:
          env-dirs: [src, scripts]
          source-dir: src
          project-root: .
          root-typings-paths: []
          project-typings-paths: []
          workspace-include-children: false
          workspace-include-child-env-dirs: []
          include-path-dependencies-in-search-path: true
          project-shared-search-paths: [scripts]
      pytest:
        # mro-j47u (codex): scaffold/modernizer consume one complete pytest model.
        min-version: "8.0"
        python-classes: ["Test*"]
        python-files: ["*_test.py", "*_tests.py", "test_*.py"]
        filter-warnings:
          - "ignore:.*cannot collect test class.*because it has a __init__ constructor.*:pytest.PytestCollectionWarning"
        standard-markers:
          - "smoke: public-interface smoke tests"
          - "unit: unit tests"
          - "integration: integration tests"
          - "performance: performance and benchmark tests"
          - "slow: slow-running tests"
          - "docker: tests requiring Docker"
          - "e2e: end-to-end integration tests"
          - "edge_cases: edge case tests"
          - "stress: stress tests"
          - "resilience: resilience tests"
        standard-addopts:
          - --strict-markers
          - --markdown-docs
          - --durations=10
          - --ignore-glob=*/tests/constants.py
          - --ignore-glob=*/tests/models.py
          - --ignore-glob=*/tests/protocols.py
          - --ignore-glob=*/tests/typings.py
          - --ignore-glob=*/tests/utilities.py
          - --ignore-glob=*/tests/_constants/*
          - --ignore-glob=*/tests/_models/*
          - --ignore-glob=*/tests/_protocols/*
          - --ignore-glob=*/tests/_typings/*
          - --ignore-glob=*/tests/_utilities/*
      tomlsort:
        all: true
        in_place: true
        sort_first: [project, build-system, tool, dependency-groups]
      vulture:
        # NOTE (multi-agent, mro-j47u): Vulture 2.16 reports keyword-bearing
        # Protocol signature parameters as unused variables at 100% confidence,
        # even with --ignore-decorators @runtime_checkable. The declaration-only
        # protocol facet is excluded; production models and runtime code remain scanned.
        exclude: ["*/_protocols/*"]
        min-confidence: 100
        paths: [src]
        verbose: false
      yamlfix:
        line_length: 88
        preserve_quotes: true
        whitelines: 1
        section_whitelines: 1
        explicit_start: false

    project-type-overrides:
      core:
        pyright: {}
      domain:
        pyright:
          reportMissingModuleSource: "warning"
      platform:
        pyright: {}
      integration:
        pyright:
          reportMissingModuleSource: "none"
          reportMissingTypeStubs: "none"
      app:
        pyright: {}
    lazy-init:
      root-namespace-files:
        - api.py
        - base.py
        - base_selection.py
        - cli.py
        - constants.py
        - container.py
        - context.py
        - decorators.py
        - dispatcher.py
        - docker.py
        - domains.py
        - exceptions.py
        - files.py
        - handlers.py
        - helpers.py
        - infra.py
        - lazy.py
        - loggings.py
        - main.py
        - tmatchers.py
        - mixins.py
        - models.py
        - protocols.py
        - registry.py
        - result.py
        - runtime.py
        - service.py
        - services.py
        - settings.py
        - shared.py
        - tap.py
        - typings.py
        - utilities.py
        - validator.py
      public-file-aliases:
        base.py: s
        constants.py: c
        docker.py: tk
        domains.py: td
        files.py: tf
        helpers.py: h
        tmatchers.py: tm
        models.py: m
        protocols.py: p
        service.py: s
        typings.py: t
        utilities.py: u
        validator.py: tv
      public-file-suffixes:
        constants.py: Constants
        docker.py: Docker
        domains.py: Domains
        files.py: Files
        helpers.py: Helpers
        tmatchers.py: MatchersUtilities
        models.py: Models
        protocols.py: Protocols
        typings.py: Types
        utilities.py: Utilities
        validator.py: Validator
      private-family-tokens:
        c: [Constants]
        m: [Models]
        p: [Protocols]
        t: [Types, Typing]
        u: [Utilities]
      surface-prefixes:
        tests: Tests
        examples: Examples
        scripts: Scripts
      inherited-exports:
        src: [c, d, e, h, m, p, r, s, t, u, x]
        tests:
          - c
          - d
          - e
          - h
          - m
          - p
          - r
          - s
          - t
          - u
          - x
          - td
          - tf
          - tk
          - tm
          - tv
        examples: [c, d, e, h, m, p, r, s, t, u, x]
        scripts: [c, d, e, h, m, p, r, s, t, u, x]
      main-export-files: [cli.py, main.py]
