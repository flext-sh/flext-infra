# Constants governance rules — loaded dynamically by codegen module
# NEVER hardcode these values in Python code
# To add new canonical values: add entries here, Python code auto-discovers them
version: "1.0.0"

rules:
  - id: NS-000
    description: "Namespace structure validation"
    fixable: false
  - id: NS-001
    description: "Standalone Final constants must live in constants.py"
    fixable: true
  - id: NS-002
    description: "Standalone TypeVar/TypeAlias must live in typings.py"
    fixable: true
    fixable_exclusion: "typings.py"
  - id: NS-003
    description: "Hardcoded canonical value should use parent MRO reference"
    fixable: true
  - id: NS-004
    description: "Unused constant can be removed"
    fixable: true
  - id: NS-005
    description: "Direct FlextXConstants.Y.Z ref should use c.Y.Z alias"
    fixable: true
  - id: NS-006
    description: "Inline value matches canonical constant — should use c.Infra.* reference"
    fixable: true

canonical_values:
  - value: 30
    type: int
    canonical_ref: "Network.DEFAULT_TIMEOUT"
    semantic_names:
      - DEFAULT_TIMEOUT
      - DEFAULT_TIMEOUT_SECONDS
      - TIMEOUT
      - TIMEOUT_SECONDS
      - CONNECTION_TIMEOUT
      - REQUEST_TIMEOUT
      - DEFAULT_REQUEST_TIMEOUT
      - OPERATION_TIMEOUT_SECONDS
      - DEFAULT_CONNECTION_TIMEOUT
      - BATCH_TIMEOUT_SECONDS
      - DEFAULT_WMS_TIMEOUT
      - DEFAULT_API_TIMEOUT
      - DEFAULT_DISCOVERY_TIMEOUT
      - SECURITY_SCAN_TIMEOUT
  - value: 3
    type: int
    canonical_ref: "DEFAULT_MAX_RETRY_ATTEMPTS"
    semantic_names:
      - DEFAULT_MAX_RETRY_ATTEMPTS
      - MAX_RETRY_ATTEMPTS
      - MAX_RETRIES
      - RETRY_ATTEMPTS
      - DEFAULT_RETRIES
  - value: 1000
    type: int
    canonical_ref: "DEFAULT_BATCH_SIZE"
    semantic_names:
      - DEFAULT_BATCH_SIZE
      - BATCH_SIZE
      - DEFAULT_COMMIT_SIZE
      - DEFAULT_PAGE_SIZE
      - MAX_PAGE_SIZE
      - PAGE_SIZE
  - value: "localhost"
    type: str
    canonical_ref: "Network.LOCALHOST"
    semantic_names:
      - LOCALHOST
      - DEFAULT_HOST
      - HOST
  - value: "utf-8"
    type: str
    canonical_ref: "Utilities.DEFAULT_ENCODING"
    semantic_names:
      - ENCODING
      - DEFAULT_ENCODING
      - CHARSET

  # frozenset canonical values
  - value: ["__pycache__", ".git", ".mypy_cache", "node_modules", ".venv", ".tox", ".nox", ".ruff_cache", "dist", "build", "site"]
    type: frozenset
    canonical_ref: "Excluded.COMMON_EXCLUDED_DIRS"
    semantic_names:
      - SKIP_DIRS
      - EXCLUDED_DIRS
      - IGNORE_DIRS
      - COMMON_EXCLUDED_DIRS
  - value: ["TypeVar", "ParamSpec", "TypeVarTuple"]
    type: frozenset
    canonical_ref: "TYPEVAR_CALLABLES"
    semantic_names:
      - TYPEVAR_CALL_NAMES
      - TYPEVAR_CALLABLES

  # tuple canonical values
  - value: ["src", "tests", "scripts", "examples"]
    type: tuple
    canonical_ref: "MRO_SCAN_DIRECTORIES"
    semantic_names:
      - SCAN_DIRECTORIES
      - KNOWN_DIRS
      - SCOPE_DIRS
  - value: ["constants.py", "typings.py", "protocols.py"]
    type: tuple
    canonical_ref: "TIER0_MODULE_FILES"
    semantic_names:
      - TIER0_MODULES

  # regex canonical values (pattern strings)
  - value: "^class\\s+(\\w+)"
    type: regex
    canonical_ref: "SourceCode.CLASS_NAME_RE"
    semantic_names:
      - CLASS_RE
      - CLASS_PATTERN
      - CLASS_NAME_RE
  - value: "^class\\s+(\\w+)\\s*\\(([^)]*)\\)\\s*:"
    type: regex
    canonical_ref: "SourceCode.CLASS_WITH_BASES_RE"
    semantic_names:
      - CLASS_DEF_RE
      - CLASS_WITH_BASES_RE
  - value: "^_?[A-Z][A-Z0-9_]*$"
    type: regex
    canonical_ref: "SourceCode.CONSTANT_NAME_RE"
    semantic_names:
      - CONSTANT_PATTERN
      - CONSTANT_NAME_RE
      - MRO_SCAN_CONSTANT_PATTERN

constants_class_pattern: 'Flext\w+Constants'
