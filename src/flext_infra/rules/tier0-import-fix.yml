rules:
  - id: tier0-import-fix
    name: "Fix Tier 0 self-referential imports"
    description: >
      Detect and fix self-referential imports in Tier 0 modules that violate
      inward-only dependency flow. Four categories: A (safe, skip), B (redirect
      core aliases to flext_core), C (move annotation-only to TYPE_CHECKING),
      D (redirect runtime L1 to direct submodule).
    enabled: true
    severity: error
    fix_action: fix_tier0_imports
    tier0_modules: ["constants.py", "typings.py", "protocols.py", "models.py", "utilities.py", "exceptions.py", "shared.py"]
    core_aliases: ["r", "e", "h", "x"]
    alias_to_submodule:
      c: "constants"
      t: "typings"
      p: "protocols"
      m: "models"
      u: "utilities"
    core_package: "flext_core"
