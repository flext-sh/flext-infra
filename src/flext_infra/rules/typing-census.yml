# Typing census and annotation fix rules.
# Driven by CST analysis — no hardcoded patterns.
# Engine discovers violations dynamically via TypingAnnotationCensusVisitor.

rules:
- id: replace-t.JsonValue-annotations
  name: "Replace t.JsonValue-based type annotations"
  description: >
    Detect and replace bare t.JsonValue, t.JsonMapping, t.JsonMapping, t.JsonList, t.JsonList, and m.TypeAdapter[t.JsonValue] annotations with t.JsonValue equivalents. Detection via CST visitor, not regex.
  enabled: true
  severity: error
  fix_action: replace_object_annotations
  skip_dunder_methods:
  - "__eq__"
  - "__ne__"
  - "__hash__"
  - "__lt__"
  - "__le__"
  - "__gt__"
  - "__ge__"

- id: remove-unused-models
  name: "Remove unused model classes"
  description: >
    Detect model classes with zero references across workspace and remove them. Uses two-pass CST analysis: ModelDefinitionCollector + ModelReferenceCollector. MRO base classes and exported models are never removed.
  enabled: true
  severity: warning
  fix_action: remove_unused_models
