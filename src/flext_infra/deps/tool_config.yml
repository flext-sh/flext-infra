  mypy:
    plugins:
      - pydantic.mypy
    disabled-error-codes:
      - name-defined
      - prop-decorator
    boolean-settings:
      ignore_missing_imports: true
      namespace_packages: true
      explicit_package_bases: true
  pydantic-mypy:
    init_forbid_extra: true
    init_typed: true
    warn_required_dynamic_aliases: true
  pyright:
    strict-settings:
      pythonVersion: '3.13'
      pythonPlatform: Linux
      typeCheckingMode: strict
    extended-settings:
      reportMissingImports: error
      reportMissingModuleSource: error
      reportMissingTypeStubs: warning
      reportUnusedImport: error
      reportUnusedVariable: error
      reportUnusedClass: error
      reportUnusedFunction: error
      reportConstantRedefinition: error
      reportIncompatibleMethodOverride: error
      reportIncompatibleVariableOverride: error
      reportInconsistentConstructor: error
      reportUnnecessaryIsInstance: warning
      reportUnnecessaryCast: error
      reportUnnecessaryComparison: warning
      reportPrivateUsage: warning
      reportCallIssue: none
    path-rules:
      source-dir: src
      project-root: .
      env-dirs:
        - src
        - tests
        - examples
        - scripts
      test-like-dirs:
        - tests
        - examples
        - scripts
      default-excludes:
        - '**/node_modules'
        - '**/__pycache__'
        - '**/.mypy_cache'
        - '**/.ruff_cache'
        - '**/.pytest_cache'
        - '**/.*'
        - .venv
        - '**/.venv'
        - '**/.venv/**'
        - '**/venv'
        - '**/venv/**'
        - '**/site-packages'
        - '**/site-packages/**'
        - '**/dist-packages'
        - '**/dist-packages/**'
      dynamic-exclude-dirs:
        - .git
        - .sisyphus
        - vendor
      root-typings-paths:
        - typings
        - typings/generated
      project-typings-paths:
        - ../typings
        - ../typings/generated
      ignored-diagnostic-globs:
        - '**/*.pyi'
      source-report-private-usage: error
      test-like-report-private-usage: none
      other-report-private-usage: none
      root-venv-path: .
      project-venv-path: ..
      venv-name: .venv
  coverage:
    fail-under:
      core: 45
      domain: 30
      platform: 25
      integration: 20
      app: 15
    show-missing: true
    skip-covered: false
    precision: 2
    omit:
      - '*/dependency_injector/providers.pyx'
  pyrefly:
    disable-project-excludes-heuristics: true
    ignore-errors-in-generated-code: true
    python-version: '3.13'
    use-ignore-files: false
    strict-errors:
      # --- type safety ---
      - annotation-mismatch
      - bad-argument-count
      - bad-argument-type
      - bad-assignment
      - bad-class-definition
      - bad-context-manager
      - bad-dunder-all
      - bad-function-definition
      - bad-index
      - bad-instantiation
      - bad-keyword-argument
      - bad-match
      - bad-param-name-override
      - bad-raise
      - bad-return
      - bad-specialization
      - bad-typed-dict
      - bad-typed-dict-key
      - bad-unpacking
      - deprecated
      - implicit-abstract-class
      - implicit-any
      - implicit-import
      - implicitly-defined-attribute
      - inconsistent-inheritance
      - inconsistent-overload
      - inconsistent-overload-default
      - invalid-annotation
      - invalid-argument
      - invalid-decorator
      - invalid-inheritance
      - invalid-literal
      - invalid-overload
      - invalid-param-spec
      - invalid-pattern
      - invalid-self-type
      - invalid-super-call
      - invalid-type-alias
      - invalid-type-var
      - invalid-type-var-tuple
      - invalid-variance
      - invalid-yield
      - missing-argument
      - missing-attribute
      - missing-import
      - missing-module-attribute
      - missing-override-decorator
      - missing-source
      - missing-source-for-stubs
      - no-access
      - no-matching-overload
      - not-a-type
      - not-async
      - not-callable
      - not-iterable
      - not-required-key-access
      - open-unpacking
      - protocol-implicitly-defined-attribute
      - read-only
      - redefinition
      - redundant-cast
      - redundant-condition
      - unannotated-attribute
      - unannotated-parameter
      - unannotated-return
      - unbound-name
      - unexpected-keyword
      - unexpected-positional-argument
      - unknown-name
      - unnecessary-comparison
      - unreachable
      - unresolvable-dunder-all
      - unsafe-overlap
      - unsupported
      - unsupported-delete
      - unsupported-operation
      - untyped-import
      - unused-coroutine
      - unused-ignore
      - variance-mismatch
    disabled-errors:
      - abstract-method-call
      - bad-override
      - non-convergent-recursion
      - non-exhaustive-match
    project-exclude-globs:
      - '**/__pycache__'
      - '**/node_modules'
      - '**/.venv/**'
      - '**/*_pb2*.py'
      - '**/*_pb2_grpc*.py'
      - '**/typings/**'
      - '**/venv/**'
      - '**/vendor/**'
      - '.flext-deps/**'
      - '.venv/**'
      - 'typings/**'
      - 'vendor/**'
    path-rules:
      env-dirs:
        - src
        - tests
        - examples
        - scripts
      source-dir: src
      project-root: .
      root-typings-paths: []
      project-typings-paths: []
      workspace-include-children: false
      workspace-include-child-env-dirs:
        - src
      include-path-dependencies-in-search-path: true
      project-shared-search-paths: []
  pytest:
    standard-markers:
      - 'unit: unit tests'
      - 'integration: integration tests'
      - 'performance: performance and benchmark tests'
      - 'slow: slow-running tests'
      - 'docker: tests requiring Docker'
      - 'e2e: end-to-end integration tests'
      - 'edge_cases: edge case tests'
      - 'stress: stress tests'
      - 'resilience: resilience tests'
    standard-addopts:
      - --strict-markers
  tomlsort:
    all: true
    in_place: true
    sort_first:
      - project
      - build-system
      - tool
      - dependency-groups
  yamlfix:
    line_length: 88
    preserve_quotes: true
    whitelines: 1
    section_whitelines: 1
    explicit_start: false

project-type-overrides:
  core:
    pyright: {}
  domain:
    pyright:
      reportMissingModuleSource: "warning"
  platform:
    pyright: {}
  integration:
    pyright:
      reportMissingModuleSource: "none"
      reportMissingTypeStubs: "none"
  app:
    pyright: {}
