Infra:
  tooling:
    # mro-j47u (codex): canonical validated tooling and suppression-policy SSOT.
    tools:
      codespell:
        check-filenames: true
        ignore-words-list: crate,nd
      # mro-j47u (codex): non-linter tool sections are config-owned as well.
      deptry:
        known-first-party: [flext_core]
        pep621-dev-dependency-groups: [dev]
      hatch:
        allow-direct-references: true
        packaged-data-dirs: [config, templates]
      ruff:
        # mro-wkii.17 (codex): every tracked Python surface remains visible;
        # only the explicitly archived legado tree is outside quality gates.
        exclude:
          - .git
          - .mypy_cache
          - .pytest_cache
          - .ruff_cache
          - .venv
          - __pycache__
          - "**/__pyrefly_virtual__/**"
          - archive
          - backup
          - build
          - dist
          - htmlcov
          - temp-backup
          - legado
          - typings
          - vendor
          - venv
        namespace-packages: [tests]
        fix: false
        line-length: 88
        preview: true
        respect-gitignore: true
        show-fixes: true
        src: [src, tests, examples, scripts]
        target-version: py313
        format:
          docstring-code-format: true
          indent-style: space
          line-ending: lf
          quote-style: double
          skip-magic-trailing-comma: true
        lint:
          select:
            - ALL
          # mro-j47u (codex): banned API messages are policy data, never template literals.
          banned-api:
            argparse: "Use cli.register_result_command + Pydantic model from flext_cli."
            click: "Use flext_cli.cli application, registration, execution, and invocation\
              \ methods."
            rich: "Use cli.print / cli.display_message / cli.render_panel / cli.render_table."
            typer: "Use cli.create_app_with_common_params / cli.register_command from flext_cli."
          ignore:
            - get-attr-with-constant
            - set-attr-with-constant
            - assert-raises-exception
            - blind-except
            - complex-structure
            - missing-trailing-comma
            - missing-copyright-notice
            - incorrect-blank-line-before-class
            - multi-line-summary-second-line
            - non-imperative-mood
            - undocumented-param
            - missing-return-type-private-function
            - docstring-missing-returns
            - docstring-extraneous-returns
            - docstring-missing-yields
            - docstring-missing-exception
            - docstring-extraneous-exception
            - line-too-long
            - commented-out-code
            - boolean-positional-value-in-call
            - logging-f-string
            - invalid-first-argument-name-for-method
            - camelcase-imported-as-lowercase
            - mixed-case-variable-in-global-scope
            - unnecessary-placeholder
            - too-many-public-methods
            - too-many-return-statements
            - too-many-branches
            - too-many-arguments
            - too-many-locals
            - too-many-statements
            - too-many-positional-arguments
            - too-many-nested-blocks
            - no-self-use
            - redefined-loop-name
            - unnecessary-lambda
            - bad-dunder-method-name
            - snake-case-type-alias
            - bad-quotes-inline-string
            - hardcoded-sql-expression
            - ambiguous-unicode-character-string
            - ambiguous-unicode-character-docstring
            - ambiguous-unicode-character-comment
            - collection-literal-concatenation
            - typing-only-first-party-import
            - typing-only-third-party-import
            - typing-only-standard-library-import
            - raise-vanilla-args
            - try-consider-else
            - raise-within-try
            - non-pep695-type-alias
            - blank-line-with-whitespace
          ignored-rule-rationales:
            unsorted-imports: Ruff sorts TYPE_CHECKING imports lexically and reverses the mandatory
              semantic c-t-p-m-u dependency order in FLEXT facades.
            import-outside-top-level: Public facade models are imported lazily only at validation and
              construction sites to preserve the c-t-p-m-u graph and prevent runtime cycles.
          isort:
            combine-as-imports: true
            force-single-line: false
            split-on-trailing-comma: false
          per-file-ignores:
            "**/.vulture_whitelist.py": [ALL]
            "**/*_pb2*.py": [ALL]
            "**/*dispatcher*": []
            "**/*docs*": [implicit-namespace-package, suspicious-subprocess-import, subprocess-without-shell-equals-true, print]
            "**/*exceptions*": [builtin-variable-shadowing, hardcoded-password-string, private-member-access]
            "**/*handlers*": []
            "**/*instrumentation*": [complex-structure, boolean-type-hint-positional-argument, private-member-access]
            "**/*loggings*": [global-statement, too-many-public-methods]
            "**/*middleware*": [any-type, boolean-type-hint-positional-argument, boolean-default-value-positional-argument, unnecessary-dunder-call, hardcoded-password-default]
            "**/*models*": [any-type, boolean-type-hint-positional-argument, import-private-name, property-with-parameters, global-statement]
            "**/*oracle*": [call-datetime-strptime-without-zone]
            "**/*result*": [import-private-name, private-member-access]
            "**/*runtime*": []
            "**/*scripts*":
              - shebang-not-executable
              - line-contains-todo
              - implicit-namespace-package
              - too-many-return-statements
              - too-many-branches
              - too-many-statements
              - magic-value-comparison
              - redefined-loop-name
              - hardcoded-password-string
              - hardcoded-password-default
              - suspicious-subprocess-import
              - subprocess-without-shell-equals-true
              - print
              - relative-imports
            "**/*service*": [mixed-case-variable-in-class-scope, suspicious-subprocess-import, subprocess-without-shell-equals-true, private-member-access, unnecessary-dunder-call]
            "**/*subprocess_utils*": [suspicious-subprocess-import, subprocess-without-shell-equals-true]
            "**/*typings*": [any-type]
            "**/*utilities*": [complex-structure, module-import-not-at-top-of-file, unnecessary-dunder-call, subprocess-run-without-check, suspicious-subprocess-import, subprocess-without-shell-equals-true]
            "**/__init__.py":
              - builtin-import-shadowing
              - any-type
              - undocumented-public-init
              - unused-import
              - undefined-local-with-import-star
              - undefined-local-with-import-star-usage
              - undefined-export
              - implicit-namespace-package
              - invalid-module-name
              - import-private-name
              - non-empty-init-module
              - runtime-import-in-type-checking-block
            "**/_utilities/parser.py": [unused-static-method-argument, boolean-type-hint-positional-argument]
            "**/settings.py": [any-type, boolean-type-hint-positional-argument, private-member-access]
            "**/_constants/*.py": [hardcoded-password-string]
            "**/constants.py": [hardcoded-password-string]
            "**/container.py": [any-type, private-member-access]
            "**/context.py": []
            "**/file_tools.py": [undocumented-public-method]
            "**/managers.py": [hardcoded-password-string]
            "**/models.py": [unnecessary-dunder-call, exec-builtin, hardcoded-password-string]
            "**/output.py":
              - boolean-type-hint-positional-argument
            # FLEXT config/settings namespaces are deliberately PascalCase
            # (config.<Namespace> / settings.<Namespace>). Protocol properties
            # must preserve that exact public member name; N802 models functions,
            # not namespace-shaped protocol attributes.
            "**/_config.py": [invalid-function-name]
            "**/_protocols/*.py": [invalid-function-name]
            "**/flext_cli/_protocols/framework.py": [builtin-argument-shadowing]
            "**/_settings.py":
              - invalid-function-name
            # flext-cli is the single framework-adapter owner. Direct Click,
            # Typer, and Rich imports stay banned in every consumer while the
            # owning boundary must import those libraries to expose the facade.
            "**/flext_cli/_utilities/formatters.py": [banned-api]
            "**/flext_cli/_utilities/framework.py": [builtin-argument-shadowing, banned-api]
            "**/plugins/*.py": [boolean-type-hint-positional-argument, boolean-default-value-positional-argument, suspicious-subprocess-import, subprocess-without-shell-equals-true, start-process-with-partial-path, relative-imports]
            "**/providers/*.py": [hardcoded-password-func-arg, hardcoded-password-default]
            "**/services/prompts.py": [undocumented-public-method, undocumented-public-init]
            "**/singer/*.py": [suspicious-subprocess-import, subprocess-without-shell-equals-true]
            "**/tools/*.py": [boolean-type-hint-positional-argument, boolean-default-value-positional-argument, invalid-function-name, suspicious-subprocess-import, subprocess-without-shell-equals-true, start-process-with-partial-path, print]
            "**/tools/**/*.py": [boolean-type-hint-positional-argument, boolean-default-value-positional-argument, invalid-function-name, suspicious-subprocess-import, subprocess-without-shell-equals-true, start-process-with-partial-path, print]
            "**/alert_manager*.py": [suspicious-url-open-usage]
            "**/external_command*.py": [suspicious-subprocess-import, subprocess-without-shell-equals-true]
            "**/orchestrator*.py": [suspicious-subprocess-import, subprocess-without-shell-equals-true]
            "**/protocol_impls/*.py": [private-member-access]
            "**/typings.py": [none-not-at-end-of-union]
            "**/workspace/*.py": [suspicious-subprocess-import, subprocess-without-shell-equals-true, start-process-with-partial-path]
      mypy:
        plugins: [pydantic.mypy, returns.contrib.mypy.returns_plugin]
        exclude: ^legado(?:/|$)
        # mro-j47u: every retained global exclusion carries its tested rationale;
        # generated pyprojects receive this evidence as managed comments.
        disabled-error-codes:
          assignment: Dependency-injector descriptors lose their MRO-bound type only in Mypy.
          attr-defined: PEP 562 facade members inherited through MRO are invisible to Mypy.
          call-arg: Pydantic v2 init signatures behind facade MRO are incomplete in Mypy.
          misc: Valid PEP 695 nested facade aliases are rejected under Mypy's misc bucket.
          name-defined: Generated PEP 562 exports are installed at runtime but absent to Mypy.
          prop-decorator: Mypy loses Pydantic computed-field descriptors across composed MRO.
          valid-type: Mypy rejects facade namespaces used as owners in valid PEP 695 aliases.
        boolean-settings:
          # Discovery + namespace (retained)
          ignore_missing_imports: true
          namespace_packages: true
          explicit_package_bases: true
          # Safe strict flags aligned with pyrefly (already 0/31 workspace-wide).
          # Noisier flags (disallow_untyped_defs, disallow_any_unimported,
          # ignore_missing_imports=false) are deferred to a follow-up cycle to
          # avoid surfacing ~20 unrelated stub issues in the same PR.
          check_untyped_defs: true
          extra_checks: true
          local_partial_types: true
          no_implicit_reexport: true
          # strict_concatenate is deprecated in mypy 1.20+; extra_checks covers it
          strict_equality: true
          warn_redundant_casts: true
          warn_return_any: true
          warn_unreachable: true
          warn_unused_ignores: true
        string-settings:
          follow_imports: normal
        overrides: []
      pydantic-mypy:
        init_forbid_extra: true
        init_typed: true
        warn_required_dynamic_aliases: true
        warn-untyped-fields: true
      pyright:
        strict-settings:
          pythonVersion: "3.13"
          pythonPlatform: Linux
          typeCheckingMode: strict
        extended-settings:
          reportArgumentType: none
          reportAttributeAccessIssue: none
          reportCallIssue: none
          reportConstantRedefinition: error
          reportIncompatibleMethodOverride: error
          reportIncompatibleVariableOverride: none
          reportInconsistentConstructor: error
          reportInvalidTypeForm: none
          reportMissingImports: error
          reportMissingModuleSource: error
          reportMissingTypeStubs: none
          reportPrivateUsage: warning
          reportUnknownArgumentType: none
          reportUnknownLambdaType: none
          reportUnknownMemberType: none
          reportUnknownParameterType: none
          reportUnknownVariableType: none
          reportUnnecessaryCast: error
          reportUnnecessaryComparison: warning
          reportUnnecessaryIsInstance: warning
          reportUnreachable: none
          reportUnsupportedDunderAll: none
          reportUntypedBaseClass: none
          reportUntypedFunctionDecorator: none
          reportUnusedClass: error
          reportUnusedFunction: error
          reportUnusedImport: error
          reportUnusedVariable: error
        lazy-import-suppressions:
          reportAssignmentType: none
          reportAttributeAccessIssue: "none"
          reportGeneralTypeIssues: none
          reportInvalidTypeForm: none
          reportPrivateImportUsage: "none"
          reportUnknownArgumentType: "none"
          reportUnknownLambdaType: "none"
          reportUnknownMemberType: none
          reportUnknownParameterType: "none"
          reportUnknownVariableType: "none"
          reportUnusedImport: "none"
        global-suppression-rationales:
          reportAssignmentType: Pyright rejects the canonical class-alias rebind after
            MRO facade composition although runtime and the other analyzers resolve it.
          reportGeneralTypeIssues: Pyright groups the same valid MRO facade alias rebind
            under its broad general diagnostic in every execution environment.
        source-env-suppressions:
          reportReturnType: "none"
        test-like-env-suppressions:
          reportArgumentType: "none"
          reportReturnType: "none"
        path-rules:
          # mro-wkii.17 (codex): source and tracked consumer surfaces are all
          # first-class environments so no analyzer can hide their diagnostics.
          source-dir: src
          project-root: .
          env-dirs: [src, tests, examples, scripts]
          test-like-dirs: [tests, examples, scripts]
          default-excludes:
            - "**/node_modules"
            - "**/__pycache__"
            - "**/__pyrefly_virtual__/**"
            - "**/.mypy_cache"
            - "**/.ruff_cache"
            - "**/.pytest_cache"
            - "**/tests/fixtures"
            - "**/tests/fixtures/**"
            - "**/.*"
            - "**/legado"
            - "**/legado/**"
            - .git
            - .reports
            - vendor
            - .venv
            - "**/.venv"
            - "**/.venv/**"
            - "**/venv"
            - "**/venv/**"
            - "**/site-packages"
            - "**/site-packages/**"
            - "**/dist-packages"
            - "**/dist-packages/**"
          root-typings-paths: []
          project-typings-paths: []
          ignored-diagnostic-globs: []
          # mro-j47u (codex): Rope 1.14/latest has no public PEP 695 walker
          # registration API. This existing-path-only environment is the tested
          # vendor boundary; broad src code keeps reportPrivateUsage=error.
          diagnostic-path-overrides:
            - root: src/flext_infra/_utilities/rope_patch
              reportPrivateUsage: none
              rationale: >-
                Rope 1.14 and upstream master require private walker handler
                registration for Python 3.13 PEP 695 source regions.
          source-report-private-usage: error
          test-like-report-private-usage: none
          other-report-private-usage: none
          root-venv-path: .
          project-venv-path: ..
          venv-name: .venv
      coverage:
        fail-under:
          core: 45
          domain: 30
          platform: 25
          integration: 20
          app: 15
        show-missing: true
        skip-covered: false
        precision: 2
        exclude-also:
          - "if _t.TYPE_CHECKING:"
          - "if TYPE_CHECKING:"
          - "if typing.TYPE_CHECKING:"
        omit: ["*/dependency_injector/providers.pyx"]
      pyrefly:
        disable-project-excludes-heuristics: true
        ignore-errors-in-generated-code: true
        python-version: "3.13"
        use-ignore-files: false
        strict-errors:
          # --- type safety ---
          - bad-argument-count
          - bad-argument-type
          - bad-assignment
          - bad-class-definition
          - bad-context-manager
          - bad-dunder-all
          - bad-function-definition
          - bad-index
          - bad-instantiation
          - bad-keyword-argument
          - bad-match
          - bad-param-name-override
          - bad-raise
          - bad-return
          - bad-specialization
          - bad-typed-dict
          - bad-typed-dict-key
          - bad-unpacking
          - deprecated
          - implicit-abstract-class
          - implicit-any
          - implicit-import
          - implicitly-defined-attribute
          - inconsistent-inheritance
          - inconsistent-overload
          - invalid-annotation
          - invalid-argument
          - invalid-decorator
          - invalid-inheritance
          - invalid-literal
          - invalid-overload
          - invalid-param-spec
          - invalid-pattern
          - invalid-self-type
          - invalid-super-call
          - invalid-type-alias
          - invalid-type-var
          - invalid-type-var-tuple
          - invalid-variance
          - invalid-yield
          - missing-argument
          - missing-attribute
          - missing-import
          - missing-module-attribute
          - missing-override-decorator
          - missing-source
          - missing-source-for-stubs
          - no-access
          - no-matching-overload
          - not-a-type
          - not-async
          - not-callable
          - not-iterable
          - not-required-key-access
          - open-unpacking
          - protocol-implicitly-defined-attribute
          - read-only
          - redefinition
          - redundant-cast
          - redundant-condition
          - unannotated-attribute
          - unannotated-parameter
          - unannotated-return
          - unbound-name
          - unexpected-keyword
          - unexpected-positional-argument
          - unknown-name
          - unnecessary-comparison
          - unnecessary-type-conversion
          - unreachable
          - unresolvable-dunder-all
          - unsafe-overlap
          - unsupported
          - unsupported-delete
          - unsupported-operation
          - untyped-import
          - unused-coroutine
          - unused-ignore
          - variance-mismatch
          - inconsistent-overload-default
        disabled-errors:
          - abstract-method-call
          - bad-override
          - non-convergent-recursion
          - non-exhaustive-match
        project-exclude-globs:
          - "**/__pycache__"
          - "**/__pyrefly_virtual__/**"
          - "**/node_modules"
          - "**/.venv/**"
          - "**/*_pb2*.py"
          - "**/*_pb2_grpc*.py"
          - "**/site-packages/**"
          - "**/typings/**"
          - "**/venv/**"
          - "**/vendor/**"
          - "**/legado/**"
          - ".venv/**"
          - "typings/**"
          - "vendor/**"
        path-rules:
          env-dirs: [src, tests, examples, scripts]
          source-dir: src
          project-root: .
          root-typings-paths: []
          project-typings-paths: []
          workspace-include-children: false
          workspace-include-child-env-dirs: []
          include-path-dependencies-in-search-path: true
          project-shared-search-paths: ["."]
      pytest:
        # mro-j47u (codex): scaffold/modernizer consume one complete pytest model.
        min-version: "8.0"
        python-classes: ["Test*"]
        python-files: ["*_test.py", "*_tests.py", "test_*.py"]
        # mro-pulj (codex): collect executable tests only; docs/examples are consumers.
        test-paths: [tests]
        filter-warnings: [error]
        standard-markers:
          - "smoke: public-interface smoke tests"
          - "unit: unit tests"
          - "integration: integration tests"
          - "performance: performance and benchmark tests"
          - "slow: slow-running tests"
          - "docker: tests requiring Docker"
          - "e2e: end-to-end integration tests"
          - "edge_cases: edge case tests"
          - "stress: stress tests"
          - "resilience: resilience tests"
        standard-addopts:
          - --strict-markers
          - --durations=10
          # operator law 2026-07-20: any test over 10s is a grave test defect,
          # surfaced as an explicit TIMEOUT failure (never accommodated).
          - --timeout=10
      tomlsort:
        all: true
        in_place: true
        sort_first: [project, build-system, tool, dependency-groups]
      vulture:
        # NOTE (multi-agent, mro-j47u): Vulture 2.16 reports keyword-bearing
        # Protocol signature parameters as unused variables at 100% confidence,
        # even with --ignore-decorators @runtime_checkable. The declaration-only
        # protocol facet is excluded; production models and runtime code remain scanned.
        exclude: ["*/_protocols/*"]
        min-confidence: 100
        paths: [src]
        verbose: false
      yamlfix:
        line_length: 88
        preserve_quotes: true
        whitelines: 1
        section_whitelines: 1
        explicit_start: false

    project-type-overrides:
      core:
        pyright: {}
      domain:
        pyright:
          reportMissingModuleSource: "warning"
      platform:
        pyright: {}
      integration:
        pyright:
          reportMissingModuleSource: "none"
          reportMissingTypeStubs: "none"
      app:
        pyright: {}
    lazy-init:
      root-namespace-files:
        - api.py
        - base.py
        - base_selection.py
        - cli.py
        - constants.py
        - container.py
        - context.py
        - decorators.py
        - dispatcher.py
        - docker.py
        - domains.py
        - exceptions.py
        - files.py
        - handlers.py
        - helpers.py
        - infra.py
        - lazy.py
        - loggings.py
        - main.py
        - tmatchers.py
        - mixins.py
        - models.py
        - protocols.py
        - registry.py
        - result.py
        - runtime.py
        - service.py
        - services.py
        - settings.py
        - shared.py
        - tap.py
        - typings.py
        - utilities.py
        - validator.py
      public-file-aliases:
        base.py: s
        constants.py: c
        docker.py: tk
        domains.py: td
        files.py: tf
        helpers.py: h
        tmatchers.py: tm
        models.py: m
        protocols.py: p
        service.py: s
        typings.py: t
        utilities.py: u
        validator.py: tv
      public-file-suffixes:
        constants.py: Constants
        docker.py: Docker
        domains.py: Domains
        files.py: Files
        helpers.py: Helpers
        lazy.py: Lazy
        tmatchers.py: MatchersUtilities
        models.py: Models
        protocols.py: Protocols
        typings.py: Types
        utilities.py: Utilities
        validator.py: Validator
      private-family-tokens:
        c: [Constants]
        m: [Models]
        p: [Protocols]
        t: [Types, Typing]
        u: [Utilities]
      surface-prefixes:
        tests: Tests
        examples: Examples
        scripts: Scripts
      inherited-exports:
        src: [c, d, e, h, m, p, r, s, t, u, x]
        tests:
          - c
          - d
          - e
          - h
          - m
          - p
          - r
          - s
          - t
          - u
          - x
          - td
          - tf
          - tk
          - tm
          - tv
        examples: [c, d, e, h, m, p, r, s, t, u, x]
        scripts: [c, d, e, h, m, p, r, s, t, u, x]
      main-export-files: [cli.py, main.py]
