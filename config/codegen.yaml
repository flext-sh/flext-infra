Infra:
  codegen:
    # NOTE(mro-wkii.17.26, agent codex): declarative SSOT targets the canonical 0.20 development branch.
    version: 1

    # mro-wkii.17.26 (codex): normalize only official compiler-owned modules.
    grpc:
      ruff_safe_fixes: [I, F401, UP009]

    toolchain:
      python_version: "3.13"
      python_minor_version: "3.13"
      python_required_version: ">=3.13,<3.14"
      # mro-wkii.17.26 (codex): generated mise pins come from validated config.
      ruff_version: "0.15.17"
      uv_version: "0.11.29"
      uv_required_version: "==0.11.29"
      uv_link_mode: copy

    providers:
      - name: flext-sh
        organization: flext-sh
        base_url: https://github.com/flext-sh
        branch: 0.20.0-dev
      - name: datacosmos-br
        organization: datacosmos-br
        base_url: https://github.com/datacosmos-br
        branch: main

    profiles:
      - name: workspace-root
        environment_scope: root
        setup_scope: root-and-members
        execution_scope: root
        discovery_scope: manifest
      - name: workspace-member
        environment_scope: root-when-attached
        setup_scope: delegate-root-when-attached
        execution_scope: root-when-attached
        discovery_scope: none
      - name: standalone
        environment_scope: self
        setup_scope: self
        execution_scope: self
        discovery_scope: none

    make:
      selector: WHAT
      apply_variable: APPLY
      apply_value: Y
      verbs:
        - name: help
          default_what: usage
          apply_guarded: false
        - name: setup
          default_what: environment
          apply_guarded: false
        - name: deps
          default_what: check
          apply_guarded: false
        - name: build
          default_what: artifacts
          apply_guarded: false
        - name: check
          default_what: all
          apply_guarded: false
        - name: test
          default_what: all
          apply_guarded: false
        - name: format
          default_what: check
          apply_guarded: true
        - name: run
          default_what: default
          apply_guarded: false
        - name: status
          default_what: diagnostics
          apply_guarded: false
        - name: docs
          default_what: check
          apply_guarded: false
        - name: clean
          default_what: generated
          apply_guarded: false
        - name: release
          default_what: status
          apply_guarded: false
        - name: codegen
          default_what: check
          apply_guarded: true
      custom_handler_policy:
        filename: custom.mk
        target_pattern: "^_custom_(help|setup|deps|build|check|test|format|run|status|docs|clean|release|codegen)_[a-z0-9][a-z0-9-]*$"
        allow_public_targets: false
        allow_generated_target_redefinition: false
        allow_toolchain_declarations: false
        allow_setup_declarations: false
        allow_help_declarations: false

    managed_files:
      # NOTE(mro-p68a.5, agent codex): existing repositories consume the same
      # declarative template ownership as new-project scaffolds.
      - path: .gitignore
        owner: codegen
        overwrite: true
      - path: .gitmodules
        owner: codegen
        overwrite: true
      - path: .mise.toml
        owner: codegen
        overwrite: true
      - path: .python-version
        owner: codegen
        overwrite: true
      - path: Makefile
        owner: codegen
        overwrite: true
      - path: pyproject.toml
        owner: codegen
        overwrite: true
      - path: custom.mk
        owner: custom
        overwrite: false
      - path: uv.lock
        owner: uv
        overwrite: false

    scaffold:
      build:
        backend: hatchling.build
        requirements: [hatchling]
      project:
        readme: README.md
        supported_licenses: [MIT]
        classifiers:
          - "Development Status :: 4 - Beta"
          - "Intended Audience :: Developers"
          - "Operating System :: OS Independent"
          - "Programming Language :: Python :: 3 :: Only"
          - "Programming Language :: Python :: 3.13"
          - "Topic :: Software Development :: Libraries :: Python Modules"
          - "Typing :: Typed"
        keywords: [clean-architecture, flext, integration, typed]
        dependency_profiles:
          # NOTE (multi-agent, cosmos-main-iz7g.1): the workspace manifest
          # declares flext_core as its upstream; conformance must model it.
          - upstream: flext_core
            runtime:
              - flext-core
              - pydantic>=2.13.3
              - pydantic-settings>=2.14.0
            codegen: [flext-infra]
            dev:
              - flext-tests
              - mypy>=2.3.0
              - pyrefly>=1.1.1,<1.2
              - pyright>=1.1.411,<1.2
              - pytest>=9.0.3,<10
              - pytest-testmon>=2.1.3,<3
              - pytest-xdist>=3.8,<4
              - ruff>=0.15.12,<0.16
              - vulture>=2.16,<3
              - yamlfix>=1.19.1,<2
          - upstream: flext_cli
            runtime:
              - flext-cli
              - flext-core
              - pydantic>=2.13.3
              - pydantic-settings>=2.14.0
            codegen: [flext-infra]
            dev:
              - flext-tests
              # mro-45r9/mro-wkii.17.30: floor lets uv select latest mypy (2.3.0 verified 0 new errors on flext-core+flext-infra); no upper cap so DBT workspaces stay resolvable.
              - mypy>=2.3.0
              - pyrefly>=1.1.1,<1.2
              - pyright>=1.1.411,<1.2
              - pytest>=9.0.3,<10
              - pytest-testmon>=2.1.3,<3
              - pytest-xdist>=3.8,<4
              - ruff>=0.15.12,<0.16
              - vulture>=2.16,<3
              - yamlfix>=1.19.1,<2
      # NOTE (mro-wkii.17.26, agent codex): repository roots are the maintained
      # SSOT; wheel destinations are generated package data, never source copies.
      resources:
        - source: config
          required: true
          wheel_destination: "{package_name}/config"
        - source: tests
          required: true
        - source: templates
          required: false
          wheel_destination: "{package_name}/templates"
        - source: schemas
          required: false
          wheel_destination: "{package_name}/schemas"
        - source: examples
          required: false
        - source: scripts
          required: false
      ping_example:
        command_name: ping
        help_text: Return the configured health response.
        success_message: pong
        enabled_default: true
        reply: pong
        disabled_reply: disabled
      gitignore_sections:
        - name: Python
          # mro-wkii.17.26 (codex): match the recursive workspace-sync bytecode rules.
          patterns:
            - "**/__pycache__/"
            - "**/*.py[cod]"
            - "*$py.class"
            - "*.egg-info/"
            - .eggs/
            - build/
            - dist/
            - .pytest_cache/
            - .mypy_cache/
            - .ruff_cache/
            - .coverage
            - htmlcov/
        - name: FLEXT
          patterns: [.venv/, .reports/, "*.tpl.rej"]
        - name: Environment and secrets
          patterns: [.env, .env.*]
        - name: Editors
          patterns: [.vscode/, .idea/, "*.swp", .DS_Store]

    templates:
      root: project
      entries:
        - source: base/README.md.j2
          destination: README.md
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/LICENSE.j2
          destination: LICENSE
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/gitignore.j2
          destination: .gitignore
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/python-version.j2
          destination: .python-version
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/env.example.j2
          destination: .env.example
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/.mise.toml.j2
          destination: .mise.toml
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        # NOTE(mro-wkii.17.11, agent codex): workspace topology owns git submodules;
        # environment activation is owned by mise + the generated Makefile.
        - source: base/gitmodules.j2
          destination: .gitmodules
          profiles: [workspace-root]
          delegate: render
          overwrite: true
        - source: base/Makefile.j2
          destination: Makefile
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/custom.mk.j2
          destination: custom.mk
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/pyproject.toml.j2
          destination: pyproject.toml
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/config/workspace.yaml.j2
          destination: config/workspace.yaml
          profiles: [workspace-root, workspace-member, standalone]
          delegate: manifest
          overwrite: false
        - source: base/src/__init__.py.j2
          destination: "src/{package_name}/__init__.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/api.py.j2
          destination: "src/{package_name}/api.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/cli.py.j2
          destination: "src/{package_name}/cli.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/__main__.py.j2
          destination: "src/{package_name}/__main__.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/base.py.j2
          destination: "src/{package_name}/base.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/models.py.j2
          destination: "src/{package_name}/models.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/typings.py.j2
          destination: "src/{package_name}/typings.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/protocols.py.j2
          destination: "src/{package_name}/protocols.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/constants.py.j2
          destination: "src/{package_name}/constants.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/utilities.py.j2
          destination: "src/{package_name}/utilities.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/_config.py.j2
          destination: "src/{package_name}/_config.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/_settings.py.j2
          destination: "src/{package_name}/_settings.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/py.typed.j2
          destination: "src/{package_name}/py.typed"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/services/__init__.py.j2
          destination: "src/{package_name}/services/__init__.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        # NOTE(codex, mro-j47u): domain behavior is generated in services, not base.py.
        - source: base/src/services/ping.py.j2
          destination: "src/{package_name}/services/ping.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        # NOTE (multi-agent, mro-wkii.19.1): runtime config is app-owned and loaded
        # by FlextConfig from the project-root config directory.
        - source: base/src/config/ns.yaml.j2
          destination: "config/{ns}.yaml"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        # NOTE (multi-agent, mro-wkii.19.1): config/settings declarations live in
        # the canonical public models/config/settings facets, never parallel parts.
        - source: base/src/_models/__init__.py.j2
          destination: "src/{package_name}/_models/__init__.py"
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/src/_models/ping.py.j2
