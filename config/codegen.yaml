          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false
        - source: base/tests/unit/config_settings_contract_tests.py.j2
          destination: tests/unit/config_settings_contract_tests.py
          profiles: [workspace-root, workspace-member, standalone]
          delegate: render
          overwrite: false

    repositories:
      - name: flext
        distribution: flext
        provider: flext-sh
        url: https://github.com/flext-sh/flext.git
        branch: 0.20.0-dev
        path: .
        role: workspace-root
        state: active
        profile: workspace-root
        checkout: root
        codegen: conform
        package: false
        editable: false
        read_only: false
